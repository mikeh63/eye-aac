<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeAAC — Jack's Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1f2733;
      --border:     #30363d;
      --accent:     #58a6ff;
      --green:      #3fb950;
      --red:        #f85149;
      --amber:      #e3b341;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --word-bg:    #1c2333;
      --word-hover: #2d3f5c;
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-rows: auto auto 1fr;
      height: 100vh;
    }

    /* ── SENTENCE BAR ─────────────────────────────── */
    .sentence-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 14px;
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-height: 86px;
      flex-shrink: 0;
    }

    .sentence-display {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      overflow-y: auto;
      line-height: 1.3;
    }

    .sentence-placeholder {
      color: var(--muted);
      font-size: 1.3rem;
      font-weight: 400;
    }

    .sentence-word {
      background: #1a3a5c;
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 2px 10px;
      animation: wordPop 0.15s ease-out;
    }

    @keyframes wordPop {
      from { transform: scale(0.75); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .sentence-cursor {
      display: inline-block;
      width: 3px; height: 2rem;
      background: var(--accent);
      border-radius: 2px;
      animation: cur-blink 1s step-end infinite;
      align-self: center;
    }
    @keyframes cur-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .action-bar {
    display: flex;
    flex-direction: row;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }

  .action-btn {
    flex: 1;
    padding: 10px 18px;
    border: none; border-radius: 8px;
    font-family: inherit; font-size: 1.4rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }

    .btn-copy  { background: var(--green); color: #000; }
    .btn-copy:hover { filter: brightness(1.15); }
    .btn-copy.copied { background: #1a5c2a; color: var(--green); }
    .btn-back  { background: var(--surface2); color: var(--amber); border: 1px solid var(--amber); }
    .btn-back:hover { filter: brightness(1.2); }
    .btn-clear { background: var(--surface2); color: var(--red); border: 1px solid var(--border); }
    .btn-clear:hover { border-color: var(--red); }
    .btn-speak { background: var(--surface2); color: var(--muted); border: 2px solid var(--border); }
    .btn-speak.on { background: #1a3a5c; color: var(--accent); border-color: var(--accent); }
    .btn-play { background: var(--surface2); color: var(--green); border: 2px solid var(--green); }
    .btn-play:hover { filter: brightness(1.2); }
    .btn-play.playing { background: #152a1e; color: var(--green); border-color: var(--green); }

    /* ── MAIN LAYOUT ──────────────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
      min-height: 0;
    }

    /* ── CAMERA PANEL ─────────────────────────────── */
    .cam-panel {
      background: var(--surface);
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      overflow-y: auto;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid var(--border);
      background: #000;
    }
    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #debug-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    .status-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); border-radius: 8px;
      padding: 7px 10px; font-size: 0.78rem; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background 0.3s;
    }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

    .cam-btn {
      width: 100%; padding: 9px;
      border: none; border-radius: 8px;
      font-family: inherit; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; transition: all 0.15s;
    }
    .cam-btn-primary { background: var(--accent); color: #000; }
    .cam-btn-primary:hover { filter: brightness(1.15); }
    .cam-btn-primary:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
    .cam-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); font-size: 0.82rem; }
    .cam-btn-secondary:hover { border-color: var(--accent); }

    .sliders { display: flex; flex-direction: column; gap: 7px; }
    .slider-row { display: flex; flex-direction: column; gap: 2px; }
    .slider-label {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
    input[type=range] { width: 100%; accent-color: var(--accent); }

    .blink-log {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem; color: var(--muted);
      text-align: center; padding: 4px 0;
      min-height: 18px;
    }
    .blink-log span { color: var(--green); }

    /* ── WORD BOARD ───────────────────────────────── */
    .board {
      display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
    }

    .category-tabs {
      display: flex; gap: 3px;
      padding: 8px 10px 0;
      border-bottom: 2px solid var(--border);
      overflow-x: auto; flex-shrink: 0;
    }
    .category-tabs::-webkit-scrollbar { height: 3px; }
    .category-tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cat-tab {
      padding: 16px 14px;
      border-radius: 7px 7px 0 0;
      border: 2px solid transparent;
      border-bottom: none;
      background: var(--surface2);
      color: var(--muted);
      font-family: inherit; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: all 0.12s;
      position: relative; bottom: -2px;
    }
    .cat-tab:hover { color: var(--text); }
    .cat-tab.active {
      color: var(--text);
      background: var(--bg);
      border-color: var(--border);
      border-bottom-color: var(--bg);
    }
    .cat-tab.hovered {
      color: var(--text);
      background: var(--surface);
      border-color: var(--accent);
    }

    .word-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      padding: 12px;
      overflow-y: auto;
      align-content: start;
      min-height: 0;
    }

    /* ── CALCULATOR ───────────────────────────────── */
    .calc-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      padding: 12px;
      gap: 10px;
      min-height: 0;
    }
    .calc-panel.active { display: flex; }

    .calc-display {
      background: #0a0e14;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      text-align: right;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
    }
    .calc-expression {
      font-size: 0.9rem;
      color: var(--muted);
      min-height: 1.2em;
      word-break: break-all;
    }
    .calc-current {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      word-break: break-all;
    }

    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      flex: 1;
    }

    .calc-btn {
      background: var(--surface2);
      border: 2px solid var(--border);
      border-radius: 10px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      transition: all 0.12s;
      position: relative;
    }
    .calc-btn.hovered {
      border-color: var(--accent);
      background: var(--word-hover);
      transform: scale(1.04);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 14px rgba(88,166,255,0.2);
    }
    .calc-btn.activated {
      transform: scale(0.94);
      border-color: var(--green);
      background: #152a1e;
    }
    .calc-btn.operator {
      background: #1e2a3a;
      border-color: #2a4a6a;
      color: var(--accent);
    }
    .calc-btn.operator.hovered {
      border-color: var(--accent);
      background: #1a3050;
    }
    .calc-btn.action {
      background: #1e1a2a;
      border-color: #3a2a5a;
      color: #b07aff;
    }
    .calc-btn.action.hovered {
      border-color: #b07aff;
      background: #2d1e4a;
    }
    .calc-btn.equals {
      background: #1a3a28;
      border-color: var(--green);
      color: var(--green);
      font-size: 1.8rem;
    }
    .calc-btn.equals.hovered {
      background: #1f4a32;
      box-shadow: 0 0 0 1px var(--green), 0 4px 14px rgba(63,185,80,0.3);
    }

    .calc-add-btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 1.4rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .calc-add-btn:hover { filter: brightness(1.15); }
    .calc-add-btn.hovered {
      filter: brightness(1.2);
      box-shadow: 0 0 0 2px var(--green), 0 4px 14px rgba(63,185,80,0.3);
    }
    .calc-add-btn.activated {
      background: #1a5c2a;
      color: var(--green);
    }

    /* ── AI PREDICTION BAR ────────────────────────── */
    .predict-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: #0d1117;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      align-items: center;
      min-height: 58px;
    }

    .predict-label {
      font-size: 0.7rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .predict-btn {
      flex: 1;
      background: #161b22;
      border: 2px solid #2a3f5c;
      border-radius: 8px;
      padding: 8px 6px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #7ab8ff;
      cursor: default;
      text-align: center;
      transition: all 0.12s;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .predict-btn.hovered {
      border-color: var(--accent);
      background: #1a2f50;
      color: #fff;
      box-shadow: 0 0 0 1px var(--accent), 0 4px 14px rgba(88,166,255,0.2);
      transform: scale(1.04);
    }

    .predict-btn.activated {
      border-color: var(--green);
      background: #152a1e;
      color: var(--green);
      transform: scale(0.96);
    }

    .predict-btn.loading {
      color: var(--muted);
      border-color: var(--border);
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .word-btn {
      background: var(--word-bg);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 8px;
      font-family: 'Atkinson Hyperlegible', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      cursor: default;
      text-align: center;
      user-select: none;
      position: relative;
      overflow: hidden;
      line-height: 1.2;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.12s, background 0.12s, transform 0.1s, box-shadow 0.12s;
    }

    .word-btn::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 10px;
      background: conic-gradient(
        rgba(88,166,255,0.22) calc(var(--dwell,0) * 1%),
        transparent 0%
      );
    }

    .word-btn.hovered {
      border-color: var(--accent);
      background: var(--word-hover);
      transform: scale(1.04);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 18px rgba(88,166,255,0.2);
    }

    .word-btn.activated {
      border-color: var(--green) !important;
      background: #152a1e !important;
      color: var(--green) !important;
      transform: scale(0.96);
    }

    .word-btn.phrase { font-size: 1.1rem; line-height: 1.3; }

    .word-btn.person {
      border-color: #4a3060;
      background: #1e1630;
    }
    .word-btn.person.hovered {
      border-color: #b07aff;
      background: #2d1e4a;
      box-shadow: 0 0 0 1px #b07aff, 0 4px 18px rgba(176,122,255,0.2);
    }

    .word-btn.quick { font-size: 1.7rem; }

    /* Word group colors */
    .word-btn.grp-pronoun    { border-color: #2a4a7f; background: #141e30; }
    .word-btn.grp-pronoun.hovered    { border-color: #58a6ff; background: #1a2f50; box-shadow: 0 0 0 1px #58a6ff; }
    .word-btn.grp-verb       { border-color: #1a5c2a; background: #0f2318; }
    .word-btn.grp-verb.hovered       { border-color: #3fb950; background: #152a1e; box-shadow: 0 0 0 1px #3fb950; }
    .word-btn.grp-preposition{ border-color: #4a2a6a; background: #1e1030; }
    .word-btn.grp-preposition.hovered{ border-color: #b07aff; background: #2d1e4a; box-shadow: 0 0 0 1px #b07aff; }
    .word-btn.grp-conjunction { border-color: #6a4a00; background: #2a1e00; }
    .word-btn.grp-conjunction.hovered{ border-color: #e3b341; background: #3a2a00; box-shadow: 0 0 0 1px #e3b341; }
    .word-btn.grp-adjective  { border-color: #6a1a1a; background: #2a0f0f; }
    .word-btn.grp-adjective.hovered  { border-color: #f85149; background: #3a1515; box-shadow: 0 0 0 1px #f85149; }
    .word-btn.grp-adverb     { border-color: #0a4a4a; background: #081e1e; }
    .word-btn.grp-adverb.hovered     { border-color: #39c5c5; background: #0f2e2e; box-shadow: 0 0 0 1px #39c5c5; }
    .word-btn.grp-question   { border-color: #4a3a00; background: #1e1800; }
    .word-btn.grp-question.hovered   { border-color: #f0a500; background: #2e2400; box-shadow: 0 0 0 1px #f0a500; }

    /* ── VIRTUAL CURSOR ───────────────────────────── */
    #cursor {
      position: fixed;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(88,166,255,0.18);
      border: 3px solid var(--accent);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 9999;
      left: 50%; top: 50%;
      box-shadow: 0 0 14px rgba(88,166,255,0.35);
      transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    }
    #cursor::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 7px; height: 7px;
      border-radius: 50%; background: var(--accent);
    }
    #cursor.blink-flash {
      background: rgba(248,81,73,0.3);
      border-color: var(--red);
      box-shadow: 0 0 22px rgba(248,81,73,0.6);
    }
    #cursor.blink-flash::after { background: var(--red); }

    /* ── LOADING ──────────────────────────────────── */
    #loading {
      position: fixed; inset: 0;
      background: rgba(13,17,23,0.96);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 9998;
    }
    #loading h2 { font-size: 1.5rem; }
    #loading p  { font-size: 0.9rem; color: var(--muted); }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Loading EyeAAC…</h2>
  <p>Starting camera and face tracking</p>
</div>

<div id="cursor"></div>

<div class="app">

  <!-- ── SENTENCE BAR ── -->
  <div class="sentence-bar">
    <div class="sentence-display" id="sentence-display">
      <span class="sentence-placeholder" id="placeholder">Blink on a word to start…</span>
      <span class="sentence-cursor"></span>
    </div>
  </div>
  <div class="action-bar">
      <button class="action-btn btn-copy"  id="btn-copy">📋 Copy</button>
      <button class="action-btn btn-back"  id="btn-back">⬅ Undo</button>
      <button class="action-btn btn-clear" id="btn-clear">✕ Clear</button>
      <button class="action-btn btn-speak" id="btn-speak">🔇 Speak OFF</button>
      <button class="action-btn btn-play" id="btn-play">▶ Play</button>
  </div>

  <div class="main">

    <!-- ── CAMERA PANEL ── -->
    <div class="cam-panel">
      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="debug-canvas" width="256" height="192"></canvas>
      </div>

      <div class="status-row">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Starting…</span>
      </div>

      <button class="cam-btn cam-btn-primary" id="btn-calibrate" disabled>
        🎯 Calibrate
      </button>
      <button class="cam-btn cam-btn-secondary" id="btn-debug">
        🐛 Debug overlay
      </button>

      <div class="sliders">
        <div class="slider-row">
          <div class="slider-label"><span>Blink Sensitivity</span><span id="blink-val">0.21</span></div>
          <input type="range" id="blink-slider" min="0.15" max="0.30" step="0.01" value="0.21">
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Cursor Sensitivity</span><span id="sens-val">4.0</span></div>
          <input type="range" id="sens-slider" min="0.5" max="10.0" step="0.1" value="4.0">
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Smoothing</span><span id="smooth-val">0.35</span></div>
          <input type="range" id="smooth-slider" min="0.05" max="0.80" step="0.05" value="0.35">
        </div>
        <div class="slider-row">
          <div class="slider-label"><span>Blink Cooldown (ms)</span><span id="cooldown-val">700</span></div>
          <input type="range" id="cooldown-slider" min="300" max="2000" step="100" value="700">
        </div>
      </div>

      <div class="blink-log" id="blink-log">No blinks yet</div>
    </div>

    <!-- ── WORD BOARD ── -->
    <div class="board">
      <div class="category-tabs" id="category-tabs"></div>
      <div class="predict-bar" id="predict-bar">
        <span class="predict-label">🤖 AI</span>
        <div class="predict-btn loading" id="p0">…</div>
        <div class="predict-btn loading" id="p1">…</div>
        <div class="predict-btn loading" id="p2">…</div>
        <div class="predict-btn loading" id="p3">…</div>
        <div class="predict-btn loading" id="p4">…</div>
        <div class="predict-btn loading" id="p5">…</div>
      </div>
      <div class="word-grid" id="word-grid"></div>

      <!-- ── CALCULATOR PANEL ── -->
      <div class="calc-panel" id="calc-panel">
        <div class="calc-display">
          <div class="calc-expression" id="calc-expression"></div>
          <div class="calc-current" id="calc-current">0</div>
        </div>
        <button class="calc-add-btn" id="calc-add-btn">➕ Add to Sentence</button>
        <div class="calc-grid" id="calc-grid">
          <!-- Row 1 -->
          <div class="calc-btn action"    data-calc="backspace">⌫</div>
          <div class="calc-btn action"    data-calc="clear">AC</div>
          <div class="calc-btn operator"  data-calc="%">%</div>
          <div class="calc-btn operator"  data-calc="÷">÷</div>
          <!-- Row 2 -->
          <div class="calc-btn"           data-calc="7">7</div>
          <div class="calc-btn"           data-calc="8">8</div>
          <div class="calc-btn"           data-calc="9">9</div>
          <div class="calc-btn operator"  data-calc="×">×</div>

//  SENTENCE STATE
// ═══════════════════════════════════════════════════
let words = [];
let activeCategory = 'quick';

function addWord(w) {
  words.push(w);
  renderSentence();
  speakWord(w);
  fetchPredictions();
}

function removeLastWord() {
  words.pop();
  renderSentence();
  fetchPredictions();
}

function clearSentence() {
  words = [];
  renderSentence();
  resetPredictions();
}

function renderSentence() {
  const display = document.getElementById('sentence-display');
  const placeholder = document.getElementById('placeholder');
  display.querySelectorAll('.sentence-word').forEach(el => el.remove());

  if (words.length === 0) {
    placeholder.style.display = '';
  } else {
    placeholder.style.display = 'none';
    const cursor = display.querySelector('.sentence-cursor');
    words.forEach(w => {
      const span = document.createElement('span');
      span.className = 'sentence-word';
      span.textContent = w;
      display.insertBefore(span, cursor);
    });
  }
}

function getSentenceText() { return words.join(' '); }

// ═══════════════════════════════════════════════════
//  CALCULATOR
// ═══════════════════════════════════════════════════
let calcCurrent    = '0';
let calcExpression = '';
let calcJustCalc   = false;  // true after = pressed

function calcDisplay() {
  document.getElementById('calc-current').textContent    = calcCurrent;
  document.getElementById('calc-expression').textContent = calcExpression;
}

function calcPress(key) {
  if (key === 'clear') {
    calcCurrent    = '0';
    calcExpression = '';
    calcJustCalc   = false;

  } else if (key === 'backspace') {
    if (calcCurrent.length > 1) {
      calcCurrent = calcCurrent.slice(0, -1);
    } else {
      calcCurrent = '0';
    }
    calcJustCalc = false;

  } else if (key === 'plusminus') {
    if (calcCurrent !== '0') {
      calcCurrent = calcCurrent.startsWith('-')
        ? calcCurrent.slice(1)
        : '-' + calcCurrent;
    }

  } else if (key === '=') {
    if (!calcExpression) return;
    try {
      const expr = calcExpression + calcCurrent;
      const jsExpr = expr
        .replace(/×/g, '*')
        .replace(/÷/g, '/')
        .replace(/−/g, '-')
        .replace(/(\d)%/g, '($1/100)')
        .replace(/([\s\*\/\+\-])\./g, '$10.');
      const result = Function('"use strict"; return (' + jsExpr + ')')();
      calcCurrent    = parseFloat(result.toPrecision(10)).toString();
      calcExpression = expr + ' =';
      calcJustCalc   = true;
    } catch(e) {
      calcCurrent = 'Error';
    }

  } else if (['+', '−', '×', '÷'].includes(key)) {
    calcExpression = (calcJustCalc ? calcCurrent : calcExpression + calcCurrent) + ' ' + key + ' ';
    calcCurrent    = '0';
    calcJustCalc   = false;

  } else if (key === '%') {
    const val = parseFloat(calcCurrent);
    if (!isNaN(val)) {
      calcCurrent = parseFloat((val / 100).toPrecision(10)).toString();
    }

  } else if (key === '.') {
      if (calcJustCalc || calcCurrent === '0') {
        calcCurrent = '0.';
        calcJustCalc = false;
        calcDisplay();
        return;
      }
      if (!calcCurrent.includes('.')) calcCurrent += '.';

  } else {
    // Digit
    if (calcJustCalc || calcCurrent === '0') {
      calcCurrent  = key;
      calcJustCalc = false;
    } else {
      if (calcCurrent.replace('-', '').length < 12) calcCurrent += key;
    }
  }
  calcDisplay();
}

// Send calculator result to sentence
function calcAddToSentence() {
  const val = calcCurrent;
  if (!val || val === '0' || val === 'Error') return;
  addWord(val);
  // Flash the display
  document.getElementById('calc-current').style.color = 'var(--green)';
  setTimeout(() => {
    document.getElementById('calc-current').style.color = '';
  }, 400);
  // Reset calculator
  calcCurrent    = '0';
  calcExpression = '';
  calcJustCalc   = false;
  calcDisplay();
}

// Mouse clicks on calc buttons
document.getElementById('calc-grid').addEventListener('click', e => {
  const btn = e.target.closest('.calc-btn');
  if (!btn) return;
  const key = btn.dataset.calc;
  calcPress(key);
  btn.classList.add('activated');
  setTimeout(() => btn.classList.remove('activated'), 200);
});

document.getElementById('calc-add-btn').addEventListener('click', () => {
  calcAddToSentence();
});

// ═══════════════════════════════════════════════════
//  AI PREDICTION
// ═══════════════════════════════════════════════════
const predictBtns = Array.from({length: 6}, (_, i) => document.getElementById('p' + i));
let predicting = false;
let pendingPredict = false;

function resetPredictions() {
  predictBtns.forEach(btn => {
    btn.textContent = '…';
    btn.className = 'predict-btn loading';
    btn.dataset.add = '';
  });
}

function setPredictions(suggestions) {
  predictBtns.forEach((btn, i) => {
    const s = suggestions[i] || '';
    btn.textContent = s;
    btn.className = 'predict-btn' + (s ? '' : ' loading');
    btn.dataset.add = s;
  });
}

async function fetchPredictions() {
  const text = getSentenceText();
  if (!text) { resetPredictions(); return; }

  if (predicting) { pendingPredict = true; return; }
  predicting = true;

  // Show loading state
  predictBtns.forEach(btn => {
    btn.className = 'predict-btn loading';
    btn.textContent = '…';
  });

  try {
    const res = await fetch('/api/predict', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sentence: text })
    });
    const data = await res.json();
    if (data.suggestions) setPredictions(data.suggestions);
  } catch (e) {
    predictBtns.forEach(btn => {
      btn.textContent = '—';
      btn.className = 'predict-btn loading';
    });
  } finally {
    predicting = false;
    if (pendingPredict) {
      pendingPredict = false;
      fetchPredictions();
    }
  }
}

    const btn = document.createElement('div');
    let cls = 'word-btn';
    if (word.type)  cls += ' ' + word.type;
    if (word.group) cls += ' grp-' + word.group;
    btn.className = cls;
    btn.textContent = word.text;
    btn.dataset.add = word.add;
    grid.appendChild(btn);
  });
}

// Mouse fallback clicks
document.getElementById('category-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  activeCategory = tab.dataset.catId;
  renderTabs(); renderGrid();
});

document.getElementById('word-grid').addEventListener('click', e => {
  const btn = e.target.closest('.word-btn');
  if (!btn) return;
  addWord(btn.dataset.add);
  btn.classList.add('activated');
  setTimeout(() => btn.classList.remove('activated'), 400);
});

document.getElementById('predict-bar').addEventListener('click', e => {
  const btn = e.target.closest('.predict-btn');
  if (!btn || !btn.dataset.add) return;
  addWord(btn.dataset.add);
  btn.classList.add('activated');
  setTimeout(() => btn.classList.remove('activated'), 400);
});

document.getElementById('btn-copy').addEventListener('click',  copyText);
document.getElementById('btn-back').addEventListener('click',  removeLastWord);
document.getElementById('btn-clear').addEventListener('click', clearSentence);

function copyText() {
  const text = getSentenceText();
  if (!text) return;

  function onSuccess() {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 2000);
    blinkLog.innerHTML = `<span>Copied to clipboard!</span>`;
  }

  function onFail() {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
      document.execCommand('copy');
      onSuccess();
    } catch (e) {
      blinkLog.innerHTML = `<span style="color:var(--red)">Copy failed — try selecting manually</span>`;
    }
    document.body.removeChild(ta);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(onFail);
  } else {
    onFail();
  }
}

// ── Speech / Click feedback ──────────────────────
let speakOn = false;

const btnSpeak = document.getElementById('btn-speak');
btnSpeak.addEventListener('click', () => {
  speakOn = !speakOn;
  btnSpeak.textContent = speakOn ? '🔊 Speak ON' : '🔇 Speak OFF';
  btnSpeak.classList.toggle('on', speakOn);
});

function speakWord(word) {
  if (speakOn) {
    const utt = new SpeechSynthesisUtterance(word);
    utt.rate = 0.95;
    utt.pitch = 1.0;
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
  } else {
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.3, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.08);
    osc.start(actx.currentTime);
    osc.stop(actx.currentTime + 0.08);
  }
}

// ── Play full sentence ───────────────────────────
const btnPlay = document.getElementById('btn-play');
btnPlay.addEventListener('click', playSentence);

function playSentence() {
  const text = getSentenceText();
  if (!text) return;
  // If already playing, stop
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
    btnPlay.textContent = '▶ Play';
    btnPlay.classList.remove('playing');
    return;
  }
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate  = 0.9;
  utt.pitch = 1.0;
  utt.onstart = () => { btnPlay.textContent = '⏹ Stop'; btnPlay.classList.add('playing'); };
  utt.onend   = () => { btnPlay.textContent = '▶ Play'; btnPlay.classList.remove('playing'); };
  utt.onerror = () => { btnPlay.textContent = '▶ Play'; btnPlay.classList.remove('playing'); };
  speechSynthesis.speak(utt);
}

renderTabs();
renderGrid();

// ═══════════════════════════════════════════════════
//  TRACKER
// ═══════════════════════════════════════════════════
const LEFT_EYE  = [33, 160, 158, 133, 153, 144];
const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
const NOSE_TIP  = 1;

const cfg = {
  blinkThreshold:  0.21,
  blinkMinFrames:  2,
  blinkCooldownMs: 700,
  smoothing:       0.35,
  sensitivity:     4.0,
};

let baseline = null;
let smoothX = 0.5, smoothY = 0.5;
let blinkCount = 0, blinkInProgress = false, lastBlinkTime = 0;
let blinkTotal = 0;
let showDebug = true;
let lastLandmarks = null;

const video       = document.getElementById('video');
const debugCanvas = document.getElementById('debug-canvas');
const dctx        = debugCanvas.getContext('2d');
const cursorEl    = document.getElementById('cursor');
const statusDot   = document.getElementById('status-dot');
const statusText  = document.getElementById('status-text');
const blinkLog    = document.getElementById('blink-log');
const btnCal      = document.getElementById('btn-calibrate');
const loadingEl   = document.getElementById('loading');

function setStatus(text, color) {
  statusText.textContent = text;
  statusDot.className = 'dot ' + (color || '');
}

function ear(lm, idx) {
  const p = idx.map(i => lm[i]);
  const v1 = Math.hypot(p[1].x - p[5].x, p[1].y - p[5].y);
  const v2 = Math.hypot(p[2].x - p[4].x, p[2].y - p[4].y);
  const h  = Math.hypot(p[0].x - p[3].x, p[0].y - p[3].y);
  return (v1 + v2) / (2 * h);
}

function getHit(px, py) {
  for (const btn of document.querySelectorAll('.word-btn')) {
    const r = btn.getBoundingClientRect();
    if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom)
      return { type: 'word', el: btn };
  }
  // Calculator buttons
  for (const btn of document.querySelectorAll('.calc-btn')) {
    const r = btn.getBoundingClientRect();
    if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom)
      return { type: 'calc', el: btn };
  }
  // Prediction buttons
  for (const btn of document.querySelectorAll('.predict-btn')) {
    if (!btn.dataset.add) continue;
    const r = btn.getBoundingClientRect();
    if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom)
      return { type: 'predict', el: btn };
  }
  for (const tab of document.querySelectorAll('.cat-tab')) {
    const r = tab.getBoundingClientRect();
    if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom)
      return { type: 'tab', el: tab };
  }
  const actions = [
    { id: 'btn-copy',      type: 'copy' },
    { id: 'btn-back',      type: 'back' },
    { id: 'btn-clear',     type: 'clear' },
    { id: 'btn-calibrate', type: 'calibrate' },
    { id: 'btn-speak',     type: 'speak' },
    { id: 'btn-play',      type: 'play' },
    { id: 'calc-add-btn',  type: 'calc-add' },
  ];
  for (const { id, type } of actions) {
    const el = document.getElementById(id);
    const r  = el.getBoundingClientRect();
    if (px >= r.left && px <= r.right && py >= r.top && py <= r.bottom)
      return { type, el };
  }
  return null;
}

function onBlink(px, py) {
  blinkTotal++;
  cursorEl.classList.add('blink-flash');
  setTimeout(() => cursorEl.classList.remove('blink-flash'), 300);

  const hit = getHit(px, py);
  if (!hit) { blinkLog.innerHTML = `Blink #${blinkTotal} — nothing targeted`; return; }

  if (hit.type === 'word') {
    const w = hit.el.dataset.add;
    hit.el.classList.add('activated');
    setTimeout(() => hit.el.classList.remove('activated'), 500);
    addWord(w);
    blinkLog.innerHTML = `Added: <span>${w}</span>`;
  } else if (hit.type === 'calc') {
    const key = hit.el.dataset.calc;
    hit.el.classList.add('activated');
    setTimeout(() => hit.el.classList.remove('activated'), 200);
    calcPress(key);
    blinkLog.innerHTML = `Calc: <span>${key}</span>`;
  } else if (hit.type === 'predict') {
    const w = hit.el.dataset.add;
    if (!w) return;
    hit.el.classList.add('activated');
    setTimeout(() => hit.el.classList.remove('activated'), 500);
    addWord(w);
    blinkLog.innerHTML = `AI predicted: <span>${w}</span>`;
  } else if (hit.type === 'tab') {
    activeCategory = hit.el.dataset.catId;
    renderTabs(); renderGrid();
    blinkLog.innerHTML = `Category: <span>${hit.el.textContent}</span>`;
  } else if (hit.type === 'copy')      { copyText();       blinkLog.innerHTML = `<span>Copied!</span>`; }
  else if (hit.type === 'back')        { removeLastWord(); blinkLog.innerHTML = `<span>Undo</span>`; }
  else if (hit.type === 'clear')       { clearSentence();  blinkLog.innerHTML = `<span>Cleared</span>`; }
  else if (hit.type === 'calibrate')   { doCalibrate(); }
  else if (hit.type === 'play')        { playSentence(); blinkLog.innerHTML = `<span>Playing…</span>`; }
  else if (hit.type === 'speak')       { btnSpeak.click(); }
  else if (hit.type === 'calc-add')    {
    hit.el.classList.add('activated');
    setTimeout(() => hit.el.classList.remove('activated'), 400);
    calcAddToSentence();
    blinkLog.innerHTML = `Added: <span>${calcCurrent}</span>`;
  }
}

function doCalibrate() {
  if (!lastLandmarks) return;
  baseline = { x: lastLandmarks[NOSE_TIP].x, y: lastLandmarks[NOSE_TIP].y };
  smoothX = 0.5; smoothY = 0.5;
  cursorEl.style.left = '50%';
  cursorEl.style.top  = '50%';
  setStatus('Calibrated — tracking active', 'green');
  btnCal.textContent = '🔄 Re-calibrate';
}

function processResults(results) {
  dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);

  if (!results.multiFaceLandmarks || !results.multiFaceLandmarks.length) {
    setStatus('No face detected', 'amber');
    return;
  }

  const lm = results.multiFaceLandmarks[0];
  lastLandmarks = lm;
  setStatus(baseline ? 'Tracking active' : 'Face found — calibrate!', baseline ? 'green' : 'amber');
  if (!baseline) btnCal.disabled = false;

  const avgEAR = (ear(lm, LEFT_EYE) + ear(lm, RIGHT_EYE)) / 2;
  const now = Date.now();

  if (avgEAR < cfg.blinkThreshold) {
    blinkCount++; blinkInProgress = true;
  } else {
    if (blinkInProgress && blinkCount >= cfg.blinkMinFrames && now - lastBlinkTime > cfg.blinkCooldownMs) {
      lastBlinkTime = now;
      const px = parseFloat(cursorEl.style.left) || smoothX * window.innerWidth;
      const py = parseFloat(cursorEl.style.top)  || smoothY * window.innerHeight;
      onBlink(px, py);
    }
    blinkCount = 0; blinkInProgress = false;
  }

  if (baseline) {
    const dx = (lm[NOSE_TIP].x - baseline.x) * cfg.sensitivity;
    const dy = (lm[NOSE_TIP].y - baseline.y) * cfg.sensitivity;
    const rawX = Math.min(1, Math.max(0, 0.5 - dx));
    const rawY = Math.min(1, Math.max(0, 0.5 + dy));
    smoothX += (rawX - smoothX) * (1 - cfg.smoothing);
    smoothY += (rawY - smoothY) * (1 - cfg.smoothing);

    const px = smoothX * window.innerWidth;
    const py = smoothY * window.innerHeight;
    cursorEl.style.left = px + 'px';
    cursorEl.style.top  = py + 'px';

    document.querySelectorAll('.word-btn').forEach(btn => {
      const r = btn.getBoundingClientRect();
      btn.classList.toggle('hovered', px >= r.left && px <= r.right && py >= r.top && py <= r.bottom);
    });
    document.querySelectorAll('.calc-btn').forEach(btn => {
      const r = btn.getBoundingClientRect();
      btn.classList.toggle('hovered', px >= r.left && px <= r.right && py >= r.top && py <= r.bottom);
    });
    const calcAddBtn = document.getElementById('calc-add-btn');
    if (calcAddBtn) {
      const r = calcAddBtn.getBoundingClientRect();
      calcAddBtn.classList.toggle('hovered', px >= r.left && px <= r.right && py >= r.top && py <= r.bottom);
    }
    document.querySelectorAll('.predict-btn').forEach(btn => {
      const r = btn.getBoundingClientRect();
      btn.classList.toggle('hovered', px >= r.left && px <= r.right && py >= r.top && py <= r.bottom);
    });
    document.querySelectorAll('.cat-tab').forEach(tab => {
      const r = tab.getBoundingClientRect();
      tab.classList.toggle('hovered', px >= r.left && px <= r.right && py >= r.top && py <= r.bottom);
    });
  }

  if (showDebug) {
    const W = debugCanvas.width, H = debugCanvas.height;
    [...LEFT_EYE, ...RIGHT_EYE].forEach(i => {
      dctx.beginPath();
      dctx.arc(lm[i].x * W, lm[i].y * H, 2, 0, 2 * Math.PI);
      dctx.fillStyle = avgEAR < cfg.blinkThreshold ? '#f85149' : '#3fb950';
      dctx.fill();
    });
    const nose = lm[NOSE_TIP];
    dctx.beginPath();
    dctx.arc(nose.x * W, nose.y * H, 4, 0, 2 * Math.PI);
    dctx.fillStyle = '#58a6ff'; dctx.fill();
    dctx.fillStyle = '#e6edf3';
    dctx.font = '11px monospace';
    dctx.fillText(`EAR ${avgEAR.toFixed(3)}`, 6, 14);
    if (blinkInProgress) { dctx.fillStyle = '#f85149'; dctx.fillText('BLINK', 6, 30); }
  }
}

// ── MediaPipe ────────────────────────────────────
const faceMesh = new FaceMesh({ locateFile: f =>
  `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
faceMesh.onResults(processResults);

const mpCamera = new Camera(video, {
  onFrame: async () => { await faceMesh.send({ image: video }); },
  width: 640, height: 480,
});
mpCamera.start().then(() => {
  loadingEl.style.display = 'none';
  setStatus('Camera started…', 'amber');
}).catch(err => {
  loadingEl.querySelector('p').textContent = 'Camera error: ' + err.message;
});

// ── Slider controls ───────────────────────────────
btnCal.addEventListener('click', doCalibrate);
document.getElementById('btn-debug').addEventListener('click', () => {
  showDebug = !showDebug;
  if (!showDebug) dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
});
document.getElementById('blink-slider').addEventListener('input', e => {
  cfg.blinkThreshold = +e.target.value;
  document.getElementById('blink-val').textContent = cfg.blinkThreshold.toFixed(2);
});
document.getElementById('sens-slider').addEventListener('input', e => {
  cfg.sensitivity = +e.target.value;
  document.getElementById('sens-val').textContent = cfg.sensitivity.toFixed(1);
});
document.getElementById('smooth-slider').addEventListener('input', e => {
  cfg.smoothing = +e.target.value;
  document.getElementById('smooth-val').textContent = cfg.smoothing.toFixed(2);
});
document.getElementById('cooldown-slider').addEventListener('input', e => {
  cfg.blinkCooldownMs = +e.target.value;
  document.getElementById('cooldown-val').textContent = cfg.blinkCooldownMs;
});
</script>
